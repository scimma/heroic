name: Deploy backend to DEV

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-backend-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for traceability)
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEV_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload .env to DEV
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" "${{ secrets.DEV_ENV_FILE }}" > .env
          scp -i ~/.ssh/id_deploy .env "${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:/home/${{ secrets.DEV_SSH_USER }}/heroic/.env"
          rm -f .env

      - name: Deploy on DEV VM
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_deploy "${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}" 'bash -se' <<'REMOTE'
          set -euo pipefail

          DEPLOY_PATH="$HOME/heroic"
          FRONTEND_PATH="$HOME/heroic-frontend"

          cd "$DEPLOY_PATH"
          git fetch origin --prune
          git checkout development
          git reset --hard origin/development

          # Stop frontend first (your requirement)
          if [ -d "$FRONTEND_PATH" ]; then
            (cd "$FRONTEND_PATH" && docker compose down) || true
          fi

          docker compose -f docker-compose.yml -f docker-compose.dev.yml down --remove-orphans
          docker compose -f docker-compose.yml -f docker-compose.dev.yml build
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

          # Optional-but-recommended: apply migrations + collect static
          docker compose -f docker-compose.yml -f docker-compose.dev.yml exec -T backend python manage.py migrate --noinput
          docker compose -f docker-compose.yml -f docker-compose.dev.yml exec -T backend python manage.py collectstatic --noinput

          # Bring frontend back (no rebuild here—frontend repo deploys itself)
          if [ -d "$FRONTEND_PATH" ]; then
            (cd "$FRONTEND_PATH" && docker compose up -d) || true
          fi
          REMOTE