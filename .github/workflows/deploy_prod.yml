name: Deploy backend to PROD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for traceability)
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload .env to PROD
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" "${{ secrets.PROD_ENV_FILE }}" > .env
          scp -i ~/.ssh/id_deploy .env "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/home/${{ secrets.PROD_SSH_USER }}/heroic/.env"
          rm -f .env

      - name: Deploy on PROD VM
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_deploy "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" 'bash -se' <<'REMOTE'
          set -euo pipefail

          DEPLOY_PATH="$HOME/heroic"
          FRONTEND_PATH="$HOME/heroic-frontend"

          cd "$DEPLOY_PATH"
          git fetch origin --prune
          git fetch --tags origin --force
          git checkout main
          git reset --hard origin/main

          # Stop frontend first (your requirement)
          if [ -d "$FRONTEND_PATH" ]; then
            (cd "$FRONTEND_PATH" && docker compose down) || true
          fi

          docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

          docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
          docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput

          if [ -d "$FRONTEND_PATH" ]; then
            (cd "$FRONTEND_PATH" && docker compose up -d) || true
          fi
          REMOTE