name: Deploy Backend

on:
  push:
    branches: [development]
    tags: ['v*.*.*']

concurrency:
  # Prevent two backend deploy runs from overlapping
  group: heroic-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tag checks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide target (dev vs prod)
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "ref_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "ref_name=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Guardrail — prod tags must be on main
        if: steps.target.outputs.env == 'prod'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --tags
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "ERROR: Tag ${GITHUB_REF_NAME} is not reachable from origin/main. Refusing to deploy."
            exit 1
          fi

      - name: Setup SSH key + known_hosts
        shell: bash
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY:  ${{ secrets.DEV_SSH_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY:  ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          if [[ "${{ steps.target.outputs.env }}" == "prod" ]]; then
            SSH_HOST="$PROD_SSH_HOST"
            SSH_USER="$PROD_SSH_USER"
            SSH_KEY="$PROD_SSH_KEY"
          else
            SSH_HOST="$DEV_SSH_HOST"
            SSH_USER="$DEV_SSH_USER"
            SSH_KEY="$DEV_SSH_KEY"
          fi

          printf '%s' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          echo "SSH_HOST=$SSH_HOST" >> "$GITHUB_ENV"
          echo "SSH_USER=$SSH_USER" >> "$GITHUB_ENV"

      - name: Upload backend .env to VM
        shell: bash
        env:
          DEV_ENV_FILE:  ${{ secrets.DEV_ENV_FILE }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.target.outputs.env }}" == "prod" ]]; then
            ENV_FILE_CONTENT="$PROD_ENV_FILE"
          else
            ENV_FILE_CONTENT="$DEV_ENV_FILE"
          fi

          TMP_ENV="$(mktemp)"
          printf '%s' "$ENV_FILE_CONTENT" > "$TMP_ENV"

          scp -i ~/.ssh/deploy_key "$TMP_ENV" "$SSH_USER@$SSH_HOST:/home/exouser/heroic/.env"
          rm -f "$TMP_ENV"

      - name: Deploy backend on VM
        shell: bash
        run: |
          set -euo pipefail

          # Compose files differ by env (your current manual invocations)
          if [[ "${{ steps.target.outputs.env }}" == "prod" ]]; then
            COMPOSE_OPTS="-f docker-compose.yml -f docker-compose.prod.yml"
            GIT_REF="${{ steps.target.outputs.ref_name }}"   # tag
          else
            COMPOSE_OPTS="-f docker-compose.yml -f docker-compose.dev.yml"
            GIT_REF="development"
          fi

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "ENV=${{ steps.target.outputs.env }} GIT_REF=$GIT_REF COMPOSE_OPTS='$COMPOSE_OPTS' bash -s" <<'REMOTE'
          set -euo pipefail

          # Cross-repo lock so frontend/backend workflows cannot overlap on the VM
          exec 9>/tmp/heroic-deploy.lock
          flock -w 1800 9

          BACKEND_DIR="/home/exouser/heroic"
          FRONTEND_DIR="/home/exouser/heroic-frontend"

          echo "================================================"
          echo " BACKEND DEPLOY ($ENV)  ref=$GIT_REF"
          echo "================================================"

          echo "[1/7] Stop frontend (required before backend rebuild)"
          if [[ -d "$FRONTEND_DIR" ]]; then
            cd "$FRONTEND_DIR"
            docker compose down || true
          fi

          echo "[2/7] Stop backend stack"
          cd "$BACKEND_DIR"
          docker compose $COMPOSE_OPTS down || true

          echo "[3/7] Update git checkout"
          git fetch --all --tags --prune

          if [[ "$ENV" == "prod" ]]; then
            git checkout --detach "$GIT_REF"
          else
            git checkout development
            git reset --hard origin/development
          fi
          git clean -fd

          echo "[4/7] Sanity check .env exists"
          test -s .env

          echo "[5/7] Build + up (no cache for deterministic patch pickup)"
          docker compose $COMPOSE_OPTS build --no-cache
          docker compose $COMPOSE_OPTS up -d

          echo "[6/7] Quick health checks"
          docker compose $COMPOSE_OPTS ps
          # nginx container should answer locally (TLS)
          curl -kfsS https://localhost/ >/dev/null

          echo "[7/7] Start frontend back up (no rebuild here)"
          if [[ -d "$FRONTEND_DIR" ]]; then
            cd "$FRONTEND_DIR"
            # Ensure external network exists (usually created by backend stack)
            docker network inspect heroic_net >/dev/null 2>&1 || docker network create heroic_net
            docker compose up -d || true
          fi

          echo "✅ BACKEND DEPLOY COMPLETE"
REMOTE