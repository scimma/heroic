name: Deploy backend to PROD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/scimma/heroic:${{ steps.tag.outputs.version }}
            ghcr.io/scimma/heroic:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_deploy <<'SSHEOF'
          ${{ secrets.PROD_SSH_KEY }}
          SSHEOF
          tr -d '\r' < ~/.ssh/id_deploy > ~/.ssh/id_deploy.clean
          mv ~/.ssh/id_deploy.clean ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH sanity check
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
              "echo ok-from-\$(hostname)"

      - name: Upload .env
        shell: bash
        run: |
          set -euo pipefail
          cat > .env <<'ENVEOF'
          ${{ secrets.PROD_ENV_FILE }}
          ENVEOF
          tr -d '\r' < .env > .env.clean
          mv .env.clean .env
          scp -i ~/.ssh/id_deploy \
              -o IdentitiesOnly=yes \
              .env \
              "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/home/${{ secrets.PROD_SSH_USER }}/heroic/.env"
          rm -f .env

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          GHCR_ACTOR="${{ github.actor }}"
          VERSION="${{ github.ref_name }}"
          ssh -i ~/.ssh/id_deploy \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
              "GHCR_TOKEN=${GHCR_TOKEN} GHCR_ACTOR=${GHCR_ACTOR} VERSION=${VERSION} bash -se" <<'REMOTE'
          set -euo pipefail

          DEPLOY_PATH="$HOME/heroic"
          FRONTEND_PATH="$HOME/heroic-frontend"
          HEROIC_IMAGE="ghcr.io/scimma/heroic:${VERSION}"

          cd "$DEPLOY_PATH"
          git fetch origin --prune
          git fetch --tags origin --force
          git checkout main
          git reset --hard origin/main

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          if [ -d "$FRONTEND_PATH" ]; then
            (cd "$FRONTEND_PATH" && docker compose down) || true
          fi

          docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans
          HEROIC_IMAGE="$HEROIC_IMAGE" docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          HEROIC_IMAGE="$HEROIC_IMAGE" docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

          if [ -d "$FRONTEND_PATH" ]; then
            (cd "$FRONTEND_PATH" && docker compose up --no-build -d) || true
          fi

          sleep 20

          HEROIC_IMAGE="$HEROIC_IMAGE" docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend poetry run python manage.py collectstatic --noinput

          REMOTE

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://heroic.scimma.org/api/observatories/ || true)
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 2 minutes"
          exit 1
