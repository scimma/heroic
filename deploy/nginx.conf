events { }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  upstream heroic_app { server backend:8000; }
  upstream heroic_frontend { server frontend:80; }

  server {
    listen 80;
    listen 443 ssl;
    server_name heroic.scimma.org;

    ssl_certificate     /etc/letsencrypt/live/heroic.scimma.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heroic.scimma.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    #  Static files
    location /static/ {
      alias /app/static/;
      expires 30d;
      add_header Cache-Control "public";
    }

    # API → Django
    location /api/ {
      proxy_pass         http://heroic_app/api/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django Admin:
    location = /admin {return 301 /admin/;}
    location /admin/ {
      proxy_pass         http://heroic_app/admin/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Your custom auth endpoint(s):
    location /auth/ {
      proxy_pass         http://heroic_app/auth/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other routes → Vue SPA with fallback
    location / {
      proxy_pass         http://heroic_frontend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      
      # Handle SPA routing - if the frontend returns 404, try index.html
      proxy_intercept_errors on;
      error_page 404 = @fallback;
    }

    # Fallback for SPA routes
    location @fallback {
      proxy_pass         http://heroic_frontend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      
      # Rewrite any path to / so the frontend serves index.html
      rewrite ^.*$ / last;
    }
  }
}