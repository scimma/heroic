services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB:       "${DB_NAME}"
      POSTGRES_USER:     "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - heroic_data:/var/lib/postgresql/data
    networks:
      - heroic_net

  redis:
    image: redis:8.4
    command: ["redis-server", "--appendonly", "yes"]
    restart: always
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 30
    expose:
      - "6379"
    networks:
      - heroic_net
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: heroic
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     "${DB_NAME}"
      DB_USER:     "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-2}"
    depends_on:
      - db
    volumes:
      - static_data:/app/static
    ports:
      - "8000:8000"
    networks:
      - heroic_net

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    image: heroic
    command: ["python", "manage.py", "readstreams"]
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     "${DB_NAME}"
      DB_USER:     "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
    depends_on:
      - db
    volumes:
      - static_data:/app/static
    networks:
      - heroic_net

  dramatiq_task_scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: heroic
    env_file:
      - .env
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     "${DB_NAME}"
      DB_USER:     "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
    mem_limit: "512m"
    restart: always
    command: >
      sh -c "python manage.py runscript heroic_base.task_scheduler"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - heroic_net

  dramatiq_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: heroic
    env_file:
      - .env
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     "${DB_NAME}"
      DB_USER:     "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
    mem_limit: "512m"
    restart: always
    command: >
      sh -c "python manage.py rundramatiq --processes 1 --threads 2"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - heroic_net

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_data:/app/static:ro
    networks:
      - heroic_net

volumes:
  heroic_data:
  redis_data:
  static_data:

networks:
  heroic_net:
    driver: bridge
    name: heroic_net
